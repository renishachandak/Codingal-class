<!DOCTYPE html>
<html>
<head>
  <title>My Ice Cream Shop Menu</title>
  <style>
    body { background-color: #e9daa3;
      text-align: center;
      color: #4a2c2a;
    }
    h1 {
      color: #e39bbf;
      font-size: 40px;
    }
    h1{font-weight: bold;
    color: #bde7ef;
     border-radius: 20px;
    background-color: #f1c8dd;
     }
    .menu {
      width: 300px;
      padding: 15px;
      border: 3px solid #eaa3f7;
      border-radius: 20px;
      background-color: rgb(244, 238, 158);
      margin: 25px auto;
    }
    ul > li {
      background-color: #a5fef4;
      color: #5c2a4a;
      font-weight: bold;
      margin: 10px;
      padding: 12px;
      font-size: 15px;
      border-radius: 15px;
      border: 2px solid #ffb6c1;
    }
    ul > li:nth-child(3) {
      background-color: #ef9de5;
      color: #b04c80;
      border: 5px solid #c870a1;
    }
    ul > li:hover {
      background-color: #ff69b4;
      color: white;
    }
    button {
      background-color: #63b5cb;
      color: white;
      border-radius: 20px;
      border: none;
      padding: 15px 25px;
      font-size: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🍧Cream Bliss🍧</h1>
  <p>🧊Scoops of Happiness🧊</p>
  <div class="menu">
    <h2>🍨Ice Cream Available</h2>
    <ul>
      <li>🍫Chocolate</li>
      <li>🍦Vanilla</li>
      <li>🍓Strawberry - Today's Special</li>
      <li>🥭Mango - Summer Special</li>
      <li>🍪Cookies&Cream</li>
    </ul>
    <button>Order Now</button>
  </div>
</body>
</html>
