<html>
    <head>
        <title>Form</title>
    </head>
    <body>
        <form>
        <fieldset>
            <legend>Personal Information</legend>
             <label>Name</label><br>
             <input type="text" placeholder="First Name">
             <input type="text" placeholder="Last Name"><br><br>
             <label>Enter Your Gender</label><br>
             <input type="radio">
             Male<br>
             <input type="radio">
             Female<br><br>
             <label>E-Mail ID</label><br>
             <input type="text" placeholder="Enter Your Valid E-mail ID"><br><br>
             <button>Sign Up</button>
        </fieldset>
        </form>
        <form oninput="x.value[parseInt[m1.value]+parseInt[m2.value]+parseInt[m3.value]]">
            <fieldset>
                <legend>School</legend>
             <label>Choose Your Stream</label><br>
             <input type="checkbox">
             Science<br>
             <input type="checkbox">
             Commerce<br>
             <input type="checkbox">
             Arts<br><br>
             <select>
                <option>
                    Maths
                </option>
                <option>
                    English
                </option>
                <option>
                    Science
                </option>
             </select>
             <input type="number" name="m1"><br>
             <select>
                <option>
                    Maths
                </option>
                <option>
                    English
                </option>
                <option>
                    Science
                </option>
             </select>
             <input type="number" name="m2"><br>
             <select>
                <option>
                    Maths
                </option>
                <option>
                    English
                </option>
                <option>
                    Science
                </option>
             </select>
             <input type="number" name="m3"><br><br>
             Average:<output name="x" for="m1 m2 m3"></output><br><br>
             <button>Submit</button>
        </fieldset> 
        </form>
    </body>
</html>
