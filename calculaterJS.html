<html>
<head>
    <title>Calculator</title>
</head>
<body>

    <div class="calculator">
        <h2>Calculator</h2>

        <input type="number" id="1" placeholder="Enter first number">
        <input type="number" id="2" placeholder="Enter second number">

        <br>

        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>

        <p id="result">Result: </p>
    </div>

    <script>
        function calculate(operator) {
            let num1 = Number(document.getElementById("1").value);
            let num2 = Number(document.getElementById("2").value);
            let result;

            if (operator === "+") {
                result = num1 + num2;
            }
            if (operator === "-") {
                result = num1 - num2;
            }
            if (operator === "*") {
                result = num1 * num2;
            }
            if (operator === "/") {
                if (num2 === 0) {
                    result = "Cannot divide by zero";
                } else {
                    result = num1 / num2;
                }
            }

            document.getElementById("result").innerHTML = "Result: " + result;
        }
    </script>

</body>
</html>
