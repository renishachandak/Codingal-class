<html>
    <head>
        <title>Caurousel</title>
         <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
</script>
    </head>
    <body>
        <div class="container">
            <h1>Caurousel</h1>
            <div  id="mycarousel" class="carousel slide" data-ride="carousel">
                <ol class="carousel-indicators">
                    <li data-target="#mycarousel" data-slide-to="0" class="active"></li>
                    <li data-target="#mycarousel" data-slide-to="1"></li>
                    <li data-target="#mycarousel" data-slide-to="3"></li>
                </ol>
            </div>
    <div class="carousel-inner">
        <div class="item-active">
            <img src="pic.1.jpg" alt="image 1">
        </div>
     <div class="carousel-inner">
         <div class="item">
        <img src="pic.2.jpg" alt="image 2">
        </div>
        </div>    
    <div class="carousel-inner">
        <div class="item">
        <img src="pic.3.jpg" alt="image 3">
        </div>
        </div>
        </div>      
           <a class="left carousel-containers" href="#mycarousel" data-slide="prev"></a>
            <span class="glyphicon glyphicon-chevron left"></span>
            <a class="right carousel-containers" href="#mycarousel" data-slide="next"></a>
            <span class="glyphicon glyphicon-chevron right"></span>
        </div>
    </body>
</html>
