<html>
    <head>
        <title>Containers in Bootstrap</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
    </script>
    </head>
    <body>
<h1>Containers In Bootstrap</h1>
<div class="Container bg-danger text-white border-bold p-3 my-5">
    <h2> Hi!</h2><br>
    My Name is Renisha.
</div>
<div class="fluid Container bg-warning mb-3 p-2 text-black">
    <h2>Hi!</h2><br>
    My Name is Renisha.
</div>
<div class="Container bg-primary my-4 p-4 text-white">
    <h2>Hi!</h2><br>
    My Name is Renisha.
</div>
<div class="fluid Container bg-success mb-5 p-5 text-black">
    <h2>Hi!</h2><br>
    My Name is Renisha.
</div>
    </body>
</html>
